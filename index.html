<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Billion Second Birthday Calculator — Find Your 1,000,000,000th Second</title>
    <meta name="description" content="Calculate exactly when you turn 1 billion seconds old. Enter your birth date and time to discover your billionth second birthday, with leap second accuracy and timezone support." />

    <link rel="canonical" href="https://billionbday.com/" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#0a0a1a" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Billion Second Birthday Calculator" />
    <meta property="og:description" content="Find out exactly when you turn 1 billion seconds old. Accurate to the second, with leap second and timezone support." />
    <meta property="og:site_name" content="Billion Second Birthday" />
    <meta property="og:url" content="https://billionbday.com/" />
    <meta property="og:image" content="https://billionbday.com/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Billion Second Birthday Calculator" />
    <meta name="twitter:description" content="Find out exactly when you turn 1 billion seconds old. Accurate to the second, with leap second and timezone support." />
    <meta name="twitter:image" content="https://billionbday.com/og-image.png" />

    <!-- Additional SEO -->
    <meta name="robots" content="index, follow" />
    <meta name="keywords" content="billion seconds, billionth second birthday, age in seconds, seconds old calculator, billion second calculator, 1000000000 seconds, birthday calculator" />

    <!-- Structured data: WebApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Billion Second Birthday Calculator",
      "url": "https://billionbday.com/",
      "description": "Calculate exactly when you turn 1 billion seconds old. Enter your birth date and time to discover your billionth second birthday.",
      "applicationCategory": "UtilityApplication",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "inLanguage": ["en", "es", "fr", "de", "pt", "it", "ja", "ko", "zh", "ar", "ru", "nl", "hi", "tr", "sv", "pl", "vi", "th", "id"]
    }
    </script>

    <!-- Structured data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How long is 1 billion seconds?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "One billion seconds is approximately 31 years, 251 days, 13 hours, 34 minutes, and 54 seconds."
          }
        },
        {
          "@type": "Question",
          "name": "How do I calculate my billionth second birthday?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Enter your birth date, optional birth time, and timezone into the calculator. It converts your birth moment to a UTC timestamp, adds exactly 1,000,000,000 seconds, and shows you the resulting date and time."
          }
        },
        {
          "@type": "Question",
          "name": "Does the calculator account for leap seconds?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The calculator displays the number of UTC leap seconds since your birth for informational purposes. The core calculation uses Unix timestamps, which absorb leap seconds via UTC clock adjustments, so your billionth second date is accurate."
          }
        },
        {
          "@type": "Question",
          "name": "Does the calculator account for leap years?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The calculation is based on Unix timestamps, which inherently account for leap years. The result is accurate regardless of how many leap years fall within your billion seconds."
          }
        },
        {
          "@type": "Question",
          "name": "Is my birth date stored or sent anywhere?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. All computation happens entirely in your browser. No birth date or personal data is transmitted to any server. There are no cookies, analytics, or tracking."
          }
        },
        {
          "@type": "Question",
          "name": "Who has already passed their billionth second?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "As of 2026, anyone born before approximately mid-1994 has already turned 1 billion seconds old."
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <noscript>
      <div style="max-width:600px;margin:80px auto;padding:24px;font-family:system-ui,sans-serif;color:#e5e7eb">
        <h1 style="font-size:1.75rem;margin-bottom:12px;text-align:center">Billion Second Birthday Calculator</h1>
        <p style="text-align:center">Calculate exactly when you turn 1,000,000,000 seconds old. Enter your birth date, optional birth time, and timezone to discover your billionth second birthday — accurate to the second, with leap second and timezone support.</p>
        <p style="margin-top:16px;text-align:center;color:#9ca3af">JavaScript is required to use the interactive calculator.</p>

        <h2 style="font-size:1.25rem;margin-top:32px;margin-bottom:8px">How It Works</h2>
        <ol style="padding-left:20px;line-height:1.8;color:#d1d5db">
          <li>Enter your birth date, time (optional — defaults to midnight), and timezone.</li>
          <li>The calculator converts your birth moment to a precise UTC timestamp.</li>
          <li>Exactly 1,000,000,000 seconds are added to find your billionth second birthday.</li>
          <li>Your result is displayed with a live age-in-seconds counter, progress bar, and calendar integration.</li>
        </ol>

        <h2 style="font-size:1.25rem;margin-top:32px;margin-bottom:8px">Features</h2>
        <ul style="padding-left:20px;line-height:1.8;color:#d1d5db">
          <li>Live age-in-seconds counter updating in real time</li>
          <li>Accounts for all 27 UTC leap seconds (1972–2017)</li>
          <li>Full IANA timezone support</li>
          <li>Add your billionth second to Google Calendar or download an .ics file</li>
          <li>Share via Web Share API or clipboard</li>
          <li>Available in 19 languages with RTL support</li>
          <li>Fully accessible (WCAG-compliant, keyboard navigation, screen readers)</li>
          <li>100% client-side — no data sent to any server</li>
        </ul>

        <h2 style="font-size:1.25rem;margin-top:32px;margin-bottom:8px">Frequently Asked Questions</h2>

        <h3 style="font-size:1rem;margin-top:16px;margin-bottom:4px">How long is 1 billion seconds?</h3>
        <p style="color:#d1d5db">One billion seconds is approximately 31 years, 251 days, 13 hours, 34 minutes, and 54 seconds.</p>

        <h3 style="font-size:1rem;margin-top:16px;margin-bottom:4px">Who has already passed their billionth second?</h3>
        <p style="color:#d1d5db">As of 2026, anyone born before approximately mid-1994 has already turned 1 billion seconds old.</p>

        <h3 style="font-size:1rem;margin-top:16px;margin-bottom:4px">Does this account for leap years?</h3>
        <p style="color:#d1d5db">Yes. The calculation uses Unix timestamps, which inherently account for leap years.</p>

        <h3 style="font-size:1rem;margin-top:16px;margin-bottom:4px">Does this account for leap seconds?</h3>
        <p style="color:#d1d5db">Leap seconds are displayed for informational purposes. The core calculation uses Unix timestamps, which absorb leap seconds via UTC clock adjustments.</p>

        <h3 style="font-size:1rem;margin-top:16px;margin-bottom:4px">Is my data stored anywhere?</h3>
        <p style="color:#d1d5db">No. Everything runs in your browser. No birth date or personal data is transmitted to any server. There are no cookies, analytics, or tracking.</p>
      </div>
    </noscript>
  </body>
</html>
